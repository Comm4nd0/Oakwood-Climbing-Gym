services:
  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - oakwood_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "8001:8000"
    volumes:
      - oakwood_media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn climbing_gym_backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2"
    restart: unless-stopped

volumes:
  oakwood_postgres_data:
  oakwood_media_data:
